name: Continuous Deployment

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    name: "Build and Push Image"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Login to Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: "Build and Push Docker Image"
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # We use shyn-auth-service as the official image name
          tags: ${{ secrets.DOCKER_USERNAME }}/shyn-auth-service:latest

  deploy:
    name: "Deploy to EC2 (shyn folder)"
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: "Pull and Restart Service"
        run: |
          # 1. Move to your infrastructure directory
          cd ~/shyn
          
          # 2. Pull the latest image for your auth service
          # NOTE: 'auth-service' here must match the key in your docker-compose.yml
          sudo docker compose pull auth-service
          
          # 3. Restart the containers with the new image
          sudo docker compose up -d --remove-orphans
          
          # 4. Clean up old images to save disk space
          sudo docker image prune -f
