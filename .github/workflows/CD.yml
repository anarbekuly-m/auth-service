name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  build-and-push:
    runs-on: ubuntu-latest # Build on GitHub (7GB RAM!)
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: anarbekulym/auth-service:latest

  deploy:
    needs: build-and-push
    runs-on: self-hosted # Just runs a simple command on EC2
    steps:
      - name: Checkout repo (for docker-compose.yml)
        uses: actions/checkout@v4

      - name: Pull and Restart
        run: |
          sudo docker compose pull auth-service
          sudo docker compose up -d --remove-orphans
          sudo docker image prune -f
