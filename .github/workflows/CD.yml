name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  deploy:
    runs-on: self-hosted

    steps:

      # --- CLEANUP STEP ---
      - name: Cleanup old Docker containers and images
        run: |
          sudo docker system prune -a -f
          # Volume сохраняется для БД

      # --- CREATE NETWORK ---
      - name: Create Docker network
        run: sudo docker network create hiking-network || true

      # --- STOP OLD CONTAINERS ---
      - name: Stop old containers
        run: |
          sudo docker rm -f auth-service-container || true
          sudo docker rm -f hiking_postgres || true
          sudo docker rm -f hiking_nginx || true  # <-- добавить NGINX

      # --- ENSURE POSTGRES VOLUME EXISTS ---
      - name: Ensure Postgres volume exists
        run: sudo docker volume create hiking_postgres_data || true

      # --- START POSTGRES ---
      - name: Start Postgres container
        run: |
          sudo docker run -d \
            --name hiking_postgres \
            --network hiking-network \
            -v hiking_postgres_data:/var/lib/postgresql/data \
            -e POSTGRES_DB=hiking_db \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=1234 \
            -p 5433:5432 \
            postgres:15

      # --- WAIT FOR POSTGRES HEALTH ---
      - name: Wait for Postgres to be ready
        run: |
          until sudo docker exec hiking_postgres pg_isready -U postgres; do
            echo "Waiting for Postgres..."
            sleep 2
          done

      # --- START AUTH SERVICE ---
      - name: Start Auth Service container
        run: |
          sudo docker run -d \
            --name auth-service-container \
            --network hiking-network \
            -p 8080:8080 \
            -e SPRING_DATASOURCE_URL=jdbc:postgresql://hiking_postgres:5432/hiking_db \
            -e SPRING_DATASOURCE_USERNAME=postgres \
            -e SPRING_DATASOURCE_PASSWORD=1234 \
            -e SPRING_JPA_HIBERNATE_DDL_AUTO=update \
            -e SPRING_SERVER_ADDRESS=0.0.0.0 \
            anarbekulym/auth-service:latest

      # --- START NGINX ---
      - name: Start NGINX container
        run: |
          sudo docker run -d \
            --name hiking_nginx \
            --network hiking-network \
            -p 80:80 \
            -v $(pwd)/nginx.conf:/etc/nginx/conf.d/default.conf:ro
            nginx:latest