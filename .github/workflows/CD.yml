name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  deploy:
    runs-on: self-hosted  # Или ubuntu-latest, если есть доступ к Docker
    steps:
      - name: Pull Docker images
        run: |
          sudo docker pull postgres:15
          sudo docker pull anarbekulym/auth-service:latest

      - name: Stop old containers
        run: |
          sudo docker rm -f auth-service-container || true
          sudo docker rm -f hiking_postgres || true

      - name: Start Postgres
        run: |
          sudo docker run -d \
            --name hiking_postgres \
            -e POSTGRES_DB=hiking_db \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=1234 \
            -p 5433:5432 \
            postgres:15

      - name: Wait for Postgres to be ready
        run: |
          for i in {1..20}; do
            if sudo docker exec hiking_postgres pg_isready -U postgres; then
              echo "Postgres is ready"
              break
            fi
            echo "Waiting for Postgres..."
            sleep 3
          done

      - name: Start Auth Service
        run: |
          sudo docker run -d \
            --name auth-service-container \
            -p 8080:8080 \
            -e SPRING_DATASOURCE_URL=jdbc:postgresql://hiking_postgres:5432/hiking_db \
            -e SPRING_DATASOURCE_USERNAME=postgres \
            -e SPRING_DATASOURCE_PASSWORD=1234 \
            -e SPRING_JPA_HIBERNATE_DDL_AUTO=update \
            anarbekulym/auth-service:latest