spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres   # если Docker 5432
    username: postgres
    password: 12345678
  jpa:
    hibernate:
      ddl-auto: update       # чтобы JPA создал таблицы автоматически
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect