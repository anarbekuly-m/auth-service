spring:
  datasource:
    # Используем переменные. Если их нет, возьмет значения после ":"
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hiking_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:12345678}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  # ТВОИ НОВЫЕ НАСТРОЙКИ GOOGLE ТУТ
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_ID}
            client-secret: ${GOOGLE_SECRET}
            scope:
              - email
              - profile

management:
  endpoints:
    web:
      exposure:
        include: mappings